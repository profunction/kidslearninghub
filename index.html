  cursor: pointer; border: none;
}
.banner-dot.active { background: white; transform: scale(1.3); }

/* ============================================
   VIDEO PLAYER PAGE
   ============================================ */
.player-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  background: #000; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px;
}
.player-wrap iframe { width: 100%; height: 100%; border: none; }
.video-actions {
  display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0;
}
.action-btn {
  padding: 12px 22px; border-radius: 50px; border: 2px solid #f0e8d8;
  background: white; font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.action-btn:active { transform: scale(0.95); }
.action-btn.favorited { border-color: var(--coral); background: #FFF0EC; color: var(--coral); }
.action-btn.completed { border-color: var(--green); background: #EDFFF5; color: #27ae60; }

.drawing-overlay {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  display: none;
}
.drawing-overlay.active { display: block; pointer-events: auto; }
.drawing-overlay canvas { width: 100%; height: 100%; cursor: crosshair; }

.timer-indicator {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px;
  background: #FFF3E8; border-radius: 50px; font-size: 13px; font-weight: 600;
  color: var(--orange); margin: 8px 0;
}

/* Quiz popup */
.quiz-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s;
}
.quiz-popup {
  background: white; border-radius: var(--radius-lg); padding: 32px 24px;
  max-width: 400px; width: 90%; text-align: center;
}
.quiz-popup h2 { font-size: 22px; margin-bottom: 12px; }
.quiz-option {
  display: block; width: 100%; padding: 14px; margin: 8px 0;
  border: 3px solid #f0e8d8; border-radius: var(--radius-md);
  background: white; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.quiz-option:hover { border-color: var(--blue); background: #f0faf9; }
.quiz-option.correct { border-color: var(--green); background: #EDFFF5; }
.quiz-option.wrong { border-color: var(--coral); background: #FFF0EC; }

/* ============================================
   COURSE PAGE
   ============================================ */
.course-header {
  background: linear-gradient(135deg, var(--purple), var(--teal));
  border-radius: var(--radius-lg); padding: 24px; color: white; margin-bottom: 16px;
}
.course-header h2 { font-size: 24px; margin-bottom: 8px; }
.course-progress-text { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }
.course-progress-bar {
  height: 10px; background: rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden;
}
.course-progress-fill {
  height: 100%; background: white; border-radius: 10px; transition: width 0.5s;
}

.timeline { position: relative; padding-left: 32px; }
.timeline::before {
  content: ''; position: absolute; left: 15px; top: 0; bottom: 0;
  width: 3px; background: #f0e8d8; border-radius: 3px;
}
.timeline-node {
  position: relative; padding: 16px; margin-bottom: 12px;
  background: white; border-radius: var(--radius-md);
  box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 14px;
}
.timeline-node.locked { opacity: 0.5; cursor: not-allowed; }
.timeline-node.current { border: 3px solid var(--purple); }
.timeline-node.completed { border-left: 4px solid var(--green); }
.timeline-node::before {
  content: ''; position: absolute; left: -25px; top: 24px;
  width: 16px; height: 16px; border-radius: 50%;
  background: white; border: 3px solid #f0e8d8; z-index: 2;
}
.timeline-node.completed::before { background: var(--green); border-color: var(--green); }
.timeline-node.current::before { background: var(--purple); border-color: var(--purple); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(199,125,255,0.5); } 50% { box-shadow: 0 0 0 12px rgba(199,125,255,0); } }
.timeline-thumb {
  width: 100px; height: 56px; border-radius: var(--radius-sm); background: #e8e4df;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.timeline-thumb img { width: 100%; height: 100%; object-fit: cover; }
.timeline-info { flex: 1; }
.timeline-info h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.timeline-info .meta { font-size: 12px; color: var(--text-light); }
.timeline-check { font-size: 24px; color: var(--green); flex-shrink: 0; }
.timeline-lock { font-size: 20px; color: #ccc; flex-shrink: 0; }

/* ============================================
   PRACTICE EXERCISES
   ============================================ */
.practice-types {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px; margin: 12px 0;
}
.practice-card {
  background: white; border-radius: var(--radius-lg); padding: 20px 14px;
  text-align: center; cursor: pointer; border: 3px solid transparent;
  box-shadow: var(--shadow); transition: all 0.25s;
}
.practice-card:active { transform: scale(0.95); }
.practice-card .p-icon { font-size: 40px; display: block; margin-bottom: 8px; }
.practice-card .p-label { font-size: 14px; font-weight: 700; }

.exercise-area {
  background: white; border-radius: var(--radius-lg); padding: 24px;
  box-shadow: var(--shadow); margin: 16px 0; min-height: 300px;
}
.listen-option {
  display: inline-block; padding: 12px 20px; margin: 6px;
  border: 2px solid #f0e8d8; border-radius: var(--radius-md);
  background: white; cursor: pointer; font-size: 18px; font-weight: 600;
  transition: all 0.2s;
}
.listen-option:hover { border-color: var(--blue); }
.listen-option.correct { border-color: var(--green); background: #EDFFF5; }
.listen-option.wrong { border-color: var(--coral); background: #FFF0EC; }

.memory-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  max-width: 360px; margin: 0 auto;
}
.memory-card {
  aspect-ratio: 1; border-radius: var(--radius-md); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; background: #f0e8d8; border: 3px solid transparent;
  transition: all 0.3s; position: relative; transform-style: preserve-3d;
}
.memory-card.flipped { background: white; border-color: var(--blue); }
.memory-card.matched { background: var(--lime); border-color: var(--green); opacity: 0.7; pointer-events: none; }

.drag-target {
  display: inline-block; width: 100px; height: 100px;
  border: 3px dashed #ccc; border-radius: var(--radius-md);
  margin: 8px; text-align: center; line-height: 100px;
  font-size: 32px; transition: all 0.3s;
}
.drag-target.over { border-color: var(--green); background: #EDFFF5; }
.drag-source {
  display: inline-block; padding: 12px 18px; margin: 6px;
  background: white; border: 2px solid #f0e8d8; border-radius: var(--radius-md);
  cursor: grab; font-weight: 700; transition: all 0.2s; user-select: none;
}
.drag-source:active { cursor: grabbing; }
.drag-source.dragging { opacity: 0.5; }

/* ============================================
   PROFILE PAGE
   ============================================ */
.profile-header {
  text-align: center; padding: 24px;
}
.avatar-display {
  width: 100px; height: 100px; border-radius: 50%;
  margin: 0 auto 12px; font-size: 60px;
  display: flex; align-items: center; justify-content: center;
  background: #FFF3E8; border: 4px solid var(--orange);
}
.avatar-selector {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 12px 0;
}
.avatar-option {
  width: 60px; height: 60px; border-radius: 50%; border: 3px solid #f0e8d8;
  font-size: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  background: white; transition: all 0.2s;
}
.avatar-option.selected { border-color: var(--orange); transform: scale(1.15); }

.stat-row { display: flex; gap: 12px; margin: 12px 0; }
.stat-box {
  flex: 1; background: white; border-radius: var(--radius-md);
  padding: 16px; text-align: center; box-shadow: var(--shadow);
}
.stat-box .stat-num { font-size: 28px; font-weight: 800; color: var(--orange); }
.stat-box .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

.streak-calendar {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 12px 0;
}
.streak-day {
  aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 600; background: #f0e8d8;
}
.streak-day.done { background: var(--green); color: white; }

.badge-wall { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
.badge-item {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; background: #f0e8d8; opacity: 0.3;
}
.badge-item.earned { opacity: 1; background: #FFF3E8; border: 3px solid var(--orange); }

/* ============================================
   PARENT PANEL
   ============================================ */
/* Toggle switch */
.toggle-switch { position: relative; display: inline-block; width: 48px; height: 26px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.3s; border-radius: 26px; }
.toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
.toggle-switch input:checked + .toggle-slider { background-color: var(--blue); }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(22px); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
.toggle-row label { font-weight: 600; font-size: 14px; }

/* Screen reader only utility */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* WebMCP tool-form-active visual feedback */
.tool-form-active,
:root :tool-form-active {
  outline: 3px solid var(--orange);
  outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(255, 140, 66, 0.2);
  transition: outline 0.2s, box-shadow 0.2s;
}
.tool-submit-active,
:root :tool-submit-active {
  background: var(--orange) !important;
  color: #fff !important;
  transform: scale(1.05);
}
:root:has(:tool-form-active) .page {
  /* indicate agent is active */
  opacity: 1;
}

.parent-tab-bar {
  display: flex; gap: 4px; margin: 16px 0; overflow-x: auto;
}
.parent-tab {
  padding: 10px 18px; border-radius: 50px; border: 2px solid #f0e8d8;
  background: white; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.parent-tab.active { background: var(--orange); color: white; border-color: var(--orange); }

.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; background: white; border-radius: var(--radius-md);
  margin: 8px 0; box-shadow: var(--shadow);
}
.setting-row label { font-weight: 700; font-size: 14px; }
.setting-row input, .setting-row select {
  padding: 10px 16px; border-radius: var(--radius-sm);
  border: 2px solid #f0e8d8; font-size: 14px; font-weight: 600; width: 80px; text-align: center;
}

.whitelist-video {
  display: flex; align-items: center; gap: 10px; padding: 12px;
  border-radius: var(--radius-sm); margin: 6px 0; background: white;
}
.whitelist-video.hidden-video { opacity: 0.4; }
.whitelist-video span { flex: 1; font-size: 13px; font-weight: 600; }
.whitelist-toggle {
  padding: 8px 16px; border-radius: 50px; border: 2px solid #f0e8d8;
  font-size: 12px; font-weight: 700; cursor: pointer; background: white;
}
.whitelist-toggle.hide { border-color: var(--coral); color: var(--coral); }

/* ============================================
   FAVORITES & PLAYLISTS
   ============================================ */
.fav-section { margin: 12px 0; }
.playlist-chip {
  display: inline-block; padding: 10px 18px; margin: 4px;
  border-radius: 50px; border: 2px solid #f0e8d8; font-size: 13px;
  font-weight: 600; cursor: pointer; background: white;
}
.playlist-chip.active { background: var(--blue); color: white; border-color: var(--blue); }
.playlist-chip.add { border-style: dashed; color: var(--text-light); }

/* ============================================
   SEARCH
   ============================================ */
.search-bar {
  display: flex; gap: 10px; margin: 12px 0;
}
.search-input {
  flex: 1; padding: 14px 20px; border-radius: 50px;
  border: 3px solid #f0e8d8; font-size: 16px; font-weight: 600;
  outline: none;
}
.search-input:focus { border-color: var(--blue); }
.voice-btn {
  width: 52px; height: 52px; border-radius: 50%;
  border: 3px solid #f0e8d8; background: white;
  font-size: 24px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.voice-btn:active { transform: scale(0.9); }
.voice-btn.listening { border-color: var(--coral); background: #FFF0EC; animation: pulse 1s infinite; }

/* ============================================
   CELEBRATION ANIMATION
   ============================================ */
.confetti-container {
  position: fixed; inset: 0; z-index: 300; pointer-events: none; overflow: hidden;
}
.confetti-piece {
  position: absolute; width: 12px; height: 12px; border-radius: 3px;
  animation: confettiFall 2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.star-popup {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 250; font-size: 60px; animation: starBurst 1.5s ease-out forwards;
  pointer-events: none;
}
@keyframes starBurst {
  0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  50% { transform: translate(-50%,-50%) scale(1.5); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
}

/* ============================================
   MODALS & OVERLAYS
   ============================================ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s;
}
.modal-content {
  background: white; border-radius: var(--radius-lg); padding: 28px 24px;
  max-width: 420px; width: 90%; max-height: 80vh; overflow-y: auto;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 600px) {
  .category-grid { grid-template-columns: repeat(3, 1fr); }
  .banner-wrap { height: 140px; }
  .banner-slide { font-size: 18px; padding: 16px 20px; }
  .pattern-grid { grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(3, 65px); }
  .pattern-dot { width: 65px; height: 65px; }
  .stat-row { flex-wrap: wrap; }
  .top-bar { padding: 10px 14px; }
  .top-nav { padding: 6px 14px; }
  .breadcrumb { padding: 6px 14px; }
  .page { padding: 12px 14px; }
  .section-title { font-size: 18px; margin: 14px 0 10px; }
}

@media (max-width: 400px) {
  .video-grid { grid-template-columns: 1fr; }
  .top-nav-item { padding: 6px 12px; font-size: 13px; }
  .age-pill { padding: 10px 18px; font-size: 14px; }
  .section-title { font-size: 17px; }
}

@media (min-width: 768px) {
  .page { max-width: 900px; margin: 0 auto; }
  .category-grid { grid-template-columns: repeat(5, 1fr); }
  .video-grid { grid-template-columns: repeat(4, 1fr); }
  .top-nav-item { font-size: 15px; padding: 10px 22px; }
  .bottom-nav { max-width: 600px; left: 50%; transform: translateX(-50%);     border-radius: 20px 20px 0 0; }
}

/* ============================================
   SIDE DECORATIONS (desktop only)
   ============================================ */
.side-decoration {
  display: none;
  position: fixed;
  top: 80px;
  z-index: 0;
  pointer-events: none;
  user-select: none;
}
.side-decoration-left {
  left: max(8px, calc((100vw - 900px) / 2 - 160px));
}
.side-decoration-right {
  right: max(8px, calc((100vw - 900px) / 2 - 160px));
}
.side-decoration svg {
  width: 140px;
  height: auto;
  display: block;
}
/* Float animations */
@keyframes floatSideA {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-8px) rotate(2deg); }
}
@keyframes floatSideB {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-6px) rotate(-2deg); }
}
@keyframes twinkleSide {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
@keyframes bounceSide {
  0%, 100% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-14px) scale(1.08); }
  60% { transform: translateY(-4px) scale(1.03); }
}
.side-cloud-wrap { animation: floatSideA 5s ease-in-out infinite; }
.side-star-wrap { animation: floatSideB 4.5s ease-in-out infinite; }
.side-heart-wrap { animation: floatSideA 6s ease-in-out infinite; }
.side-balloon-wrap { animation: floatSideB 5.5s ease-in-out infinite; }
.side-rainbow-wrap { animation: floatSideA 7s ease-in-out infinite; }
.side-note-wrap { animation: floatSideB 4s ease-in-out infinite; }
.side-sparkle { animation: twinkleSide 2.5s ease-in-out infinite; }
.side-sparkle:nth-child(2) { animation-delay: 0.8s; }
.side-sparkle:nth-child(3) { animation-delay: 1.6s; }
.side-decoration svg .pup-jump { animation: bounceSide 3s ease-in-out infinite; }
.side-decoration svg .pup-jump2 { animation: bounceSide 3s ease-in-out infinite; animation-delay: 1.5s; }

@media (min-width: 1100px) {
  .side-decoration { display: block; }
}

/* ============================================
   KIDS ILLUSTRATION ROW
   ============================================ */
.kids-illustration-row {
  position: relative;
  margin: 24px -16px 0;
  padding: 28px 10px 40px;
  background: linear-gradient(180deg, #FFF8EE 0%, #FFF0E5 40%, #E8F8F5 100%);
  overflow: hidden;
  border-radius: 20px 20px 0 0;
}
.kids-illu-inner {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 12px;
  max-width: 720px;
  margin: 0 auto;
}
.kids-illu-item {
  flex: 1;
  max-width: 140px;
  display: flex;
  justify-content: center;
}
.kids-illu-svg {
  width: 100%;
  max-width: 130px;
  height: auto;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
  transition: transform 0.3s ease;
}
.kids-illu-svg:hover {
  transform: translateY(-6px);
}
.kids-illu-grass {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 24px;
  background: linear-gradient(180deg, #A8E6CF 0%, #7BC8A4 100%);
  border-radius: 0 0 20px 20px;
}
/* Floating decorative dots */
.kids-illustration-row::before {
  content: '';
  position: absolute;
  top: 12px;
  left: 15%;
  width: 8px; height: 8px;
  background: #FFD700;
  border-radius: 50%;
  opacity: 0.6;
  animation: float-dot 3s ease-in-out infinite;
}
.kids-illustration-row::after {
  content: '';
  position: absolute;
  top: 20px;
  right: 20%;
  width: 6px; height: 6px;
  background: #FF6B9D;
  border-radius: 50%;
  opacity: 0.5;
  animation: float-dot 3.5s ease-in-out 0.5s infinite;
}
@keyframes float-dot {
  0%, 100% { transform: translateY(0); opacity: 0.5; }
  50% { transform: translateY(-8px); opacity: 0.8; }
}
@media (max-width: 600px) {
  .kids-illu-inner {
    gap: 4px;
  }
  .kids-illu-item {
    max-width: 100px;
  }
  .kids-illu-svg {
    max-width: 90px;
  }
  .kids-illustration-row {
    padding: 20px 4px 36px;
  }
}
@media (max-width: 400px) {
  .kids-illu-item:nth-child(3),
  .kids-illu-item:nth-child(4) {
    display: none;
  }
  .kids-illu-item {
    max-width: 130px;
  }
  .kids-illu-svg {
    max-width: 120px;
  }
}

/* ============================================
   RELATED RECOMMENDATIONS
   ============================================ */
.related-section { padding: 0 20px 30px; max-width: 900px; margin: 0 auto; }
.related-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: #4A4A4A; display: flex; align-items: center; gap: 8px; }
.related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.related-card { 
  background: white; border-radius: 14px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer; transition: all 0.25s; display: flex; flex-direction: column; gap: 6px;
  border: 2px solid transparent; text-decoration: none; color: inherit;
}
.related-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.10); border-color: var(--orange); }
.related-card .rc-icon { font-size: 28px; line-height: 1; }
.related-card .rc-title { font-size: 13px; font-weight: 700; line-height: 1.4; }
.related-card .rc-desc { font-size: 11px; color: #888; line-height: 1.4; }
.related-card .rc-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #f0e8d8; color: #8B6914; margin-top: 2px; }

/* ============================================
   SITE FOOTER
   ============================================ */
.site-footer {
  margin: 32px -16px -12px;
  padding: 0;
  background: #1a1a2e;
  color: #ccc;
  font-size: 13px;
  border-radius: 20px 20px 0 0;
}
.site-footer-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 20px 20px;
}
.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 28px;

// ─── I18N helpers ──────────────────────────────────────────────
function t(path, replacements) {
  const lang = APP.lang || 'zh';
  let text = I18N[lang]?.[path] || I18N['zh']?.[path] || path;
  if (replacements) {
    Object.keys(replacements).forEach(k => {
      text = text.replace('{' + k + '}', replacements[k]);
    });
  }
  return text;
}

// Also expose as global for inline template usage
window.t = t;

function toggleLang() {
  APP.lang = APP.lang === 'zh' ? 'en' : 'zh';
  const s = getStore();
  s.lang = APP.lang;
  saveStore(s);
  document.documentElement.lang = APP.lang === 'zh' ? 'zh-CN' : 'en';
  // Re-render current page
  navigateTo(APP.currentPage);
  updateNavLabels();
  updateTopNavLabels();
  updateBreadcrumb(APP.currentPage, {});
}

function updateTopNavLabels() {
  var isZh = APP.lang === 'zh';
  var items = document.querySelectorAll('.top-nav-item');
  var labels = isZh
    ? ['首页','课程','练习册','按年龄','博客','关于我们']
    : ['Home','Courses','Worksheets','By Age','Blog','About'];
  items.forEach(function(item, i) {
    if (labels[i]) item.textContent = labels[i];
  });
  // Update lang toggle button
  var langBtn = document.getElementById('lang-toggle');
  if (langBtn) {
    langBtn.setAttribute('aria-label', isZh ? 'Switch to English' : '切换到中文');
    langBtn.setAttribute('title', isZh ? 'Switch to English' : '切换到中文');
  }
  // Update search/fav buttons
  var searchBtn = document.querySelector('.top-btn[onclick*="search"]');
  if (searchBtn) { searchBtn.setAttribute('aria-label', isZh ? '搜索' : 'Search'); searchBtn.setAttribute('title', isZh ? '搜索' : 'Search'); }
  var favBtn = document.querySelector('.top-btn[onclick*="favorites"]');
  if (favBtn) { favBtn.setAttribute('aria-label', isZh ? '收藏夹' : 'Favorites'); favBtn.setAttribute('title', isZh ? '收藏夹' : 'Favorites'); }
}

function updateNavLabels() {
  document.querySelectorAll('.nav-item').forEach(el => {
    const label = el.querySelector('.nav-label');
    if (!label) return;
    const page = el.dataset.page;
    const keyMap = { home:'home', courses:'courses', practice:'practice', me:'achievements', parent:'settings' };
    if (keyMap[page]) label.textContent = t(keyMap[page]);
  });
}

// ─── SOUND ENGINE (AudioContext short beeps) ──────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  return audioCtx;
}

function playBeep(freq = 600, duration = 0.12, type = 'sine') {
  const s = getStore();
  if (!s.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
  } catch(e) { /* audio not available */ }
}

function playClick() { playBeep(800, 0.08); }
function playSuccess() { playBeep(880, 0.15); }
function playError() { playBeep(200, 0.2, 'square'); }
function playCelebration() { playBeep(1047, 0.2); }

function showConfetti(count = 50) {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  const colors = ['#FF6B6B','#FFD93D','#4ECDC4','#C77DFF','#96CEB4','#FF8C42','#45B7D1'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 20) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.width = (8 + Math.random() * 10) + 'px';
    piece.style.height = (8 + Math.random() * 10) + 'px';
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 3000);
}

function showStarPopup(text = '⭐ +1 星星！') {
  const el = document.createElement('div');
  el.className = 'star-popup';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function getVideosByAge(maxAge) {
  if (!maxAge) return [...VIDEO_DB];
  return VIDEO_DB.filter(v => v.ages[0] <= maxAge && v.ages[1] >= maxAge - 2);
}
function getVideosByCategory(cat) {
  return VIDEO_DB.filter(v => v.category === cat);
}
function getYouTubeThumb(id) {
  return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

// ─── STORE OPERATIONS ─────────────────────────────────────────
function addStar(n = 1) {
  const s = getStore(); s.stars += n;
  // Check badge: star-5, star-15
  if (s.stars >= 5 && !s.badges.includes('star-5')) { s.badges.push('star-5'); showBadgeEarned('star-5'); }
  if (s.stars >= 15 && !s.badges.includes('star-15')) { s.badges.push('star-15'); showBadgeEarned('star-15'); }
  saveStore(s);
  return s.stars;
}

function markCompleted(videoId) {
  const s = getStore();
  if (!s.completed.includes(videoId)) {
    s.completed.push(videoId);
    s.watchCount++;

    // Check badge: first-watch
    if (s.watchCount >= 1 && !s.badges.includes('first-watch')) { s.badges.push('first-watch'); showBadgeEarned('first-watch'); }
    if (s.watchCount >= 10 && !s.badges.includes('video-10')) { s.badges.push('video-10'); showBadgeEarned('video-10'); }

    // Check course completion
    checkCourseCompletion(videoId, s);
  }
  saveStore(s);
}

function checkCourseCompletion(videoId, s) {
  // Check abc-fun course
  const abcCourse = COURSE_DB.find(c => c.id === 'abc-fun');
  if (abcCourse && abcCourse.videoIds.every(vid => s.completed.includes(vid)) && !s.badges.includes('course-abc')) {
    s.badges.push('course-abc'); showBadgeEarned('course-abc');
  }
  // Check numbers course
  const numCourse = COURSE_DB.find(c => c.id === 'numbers-1-10');
  if (numCourse && numCourse.videoIds.every(vid => s.completed.includes(vid)) && !s.badges.includes('course-math')) {
    s.badges.push('course-math'); showBadgeEarned('course-math');
  }
}

function showBadgeEarned(badgeId) {
  const badge = BADGES.find(b => b.id === badgeId);
  if (!badge) return;
  const badgeNameKey = {'first-watch':'badge_first_watch','streak-3':'badge_streak3','streak-7':'badge_streak7','star-5':'badge_star5','star-15':'badge_star15','video-10':'badge_video10','course-abc':'badge_course_abc','course-math':'badge_course_math'}[badgeId];
  setTimeout(() => {
    showStarPopup(`🏅 ${t(badgeNameKey)} ${t('badge_unlocked')}`);
    playCelebration(); showConfetti(40);
  }, 500);
}

function toggleFavorite(videoId) {
  const s = getStore();
  const idx = s.favorites.indexOf(videoId);
  if (idx >= 0) { s.favorites.splice(idx, 1); } else { s.favorites.push(videoId); }
  saveStore(s); playClick();
  return idx < 0; // returns true if now favorited
}

function isFavorited(videoId) { return getStore().favorites.includes(videoId); }
function isCompleted(videoId) { return getStore().completed.includes(videoId); }

function updateStreak() {
  const s = getStore();
  const today = new Date().toISOString().slice(0, 10);
  if (s.lastActiveDate === today) return; // already recorded today
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (s.lastActiveDate === yesterday) { s.streak++; } else { s.streak = 1; }
  s.lastActiveDate = today;
  if (!s.streakDates.includes(today)) s.streakDates.push(today);

  // Check streak badges
  if (s.streak >= 3 && !s.badges.includes('streak-3')) { s.badges.push('streak-3'); showBadgeEarned('streak-3'); }
  if (s.streak >= 7 && !s.badges.includes('streak-7')) { s.badges.push('streak-7'); showBadgeEarned('streak-7'); }
  saveStore(s);
}

// ─── STRUCTURED DATA INJECTION ──────────────────────────────────
function injectStructuredData(page, params) {
  var lang = document.documentElement.lang === 'en' ? 'en' : 'zh';
  // Remove previous dynamic LD+JSON scripts (keep static Organization/WebSite)
  document.querySelectorAll('script[data-dynamic-schema]').forEach(function(el) { el.remove(); });
  var schemas = [];

  // BreadcrumbList (every page)
  schemas.push(getBreadcrumb(page, lang));

  // Page-specific schemas
  switch(page) {
    case 'home':
      // Static Organization + WebSite already in <head>, no dynamic needed
      break;
    case 'course':
      schemas.push(getCourseSchema(params.courseId, lang));
      schemas.push(getEducationalAudience(params.courseId));
      break;
    case 'courses':
      schemas.push(getItemListSchema('courses', lang));
      break;
    case 'blog':
      schemas.push(getItemListSchema('blog', lang));
      break;
    case 'blogPost':
      schemas.push(getBlogArticleSchema(params.postId, lang));
      break;
    case 'about':
      schemas.push(getFAQSchema(lang));
      break;
    case 'ageHub':
      schemas.push(getCollectionPageSchema('age', params.age, lang));
      break;
    case 'subjectHub':
      schemas.push(getCollectionPageSchema('subject', params.subject, lang));
      break;
  }

  // Inject all schemas
  schemas.forEach(function(schema) {
    var script = document.createElement('script');
    script.type = 'application/ld+json';
    script.setAttribute('data-dynamic-schema', 'true');
    script.textContent = JSON.stringify(schema, null, 2);
    document.head.appendChild(script);
  });
}

function updateBreadcrumb(page, params) {
  var bc = document.getElementById('breadcrumb');
  if (!bc) return;
  var isZh = document.documentElement.lang === 'zh-CN';

  // Helper: build a breadcrumb link (clickable) or current (non-clickable)
  function bcLink(href, pageId, label) {
    return '<span class="breadcrumb-item"><a href="#' + href + '" data-page="' + pageId + '">' + label + '</a></span>';
  }
  function bcCurrent(label) {
    return '<span class="breadcrumb-item">' + label + '</span>';
  }

  // Translation shortcuts
  var L = {
    home: isZh ? '首页' : 'Home',
    courses: isZh ? '课程' : 'Courses',
    blog: isZh ? '博客' : 'Blog',
    byAge: isZh ? '按年龄' : 'By Age',
    bySubject: isZh ? '按学科' : 'By Subject',
    practice: isZh ? '练习册' : 'Worksheets',
    about: isZh ? '关于我们' : 'About',
    feedback: isZh ? '反馈' : 'Feedback',
    search: isZh ? '搜索' : 'Search',
    profile: isZh ? '个人中心' : 'Profile',
    settings: isZh ? '家长设置' : 'Settings',
    watch: isZh ? '播放' : 'Watch'
  };

  var items = [bcLink('home', 'home', L.home)];

  switch(page) {
    case 'home':
      // Only home, nothing to add
      break;

    case 'courses':
      items.push(bcCurrent(L.courses));
      break;

    case 'course':
      items.push(bcLink('courses', 'courses', L.courses));
      var cInfo = params.courseId ? COURSE_DB.find(function(c){return c.id===params.courseId;}) : null;
      items.push(bcCurrent(cInfo ? cInfo.icon + ' ' + cInfo.name : (isZh ? '课程详情' : 'Course')));
      break;

    case 'practice':
      items.push(bcCurrent(L.practice));
      break;

    case 'blog':
      items.push(bcCurrent(L.blog));
      break;

    case 'blogPost':
      items.push(bcLink('blog', 'blog', L.blog));
      var pInfo = params.postId ? BLOG_POSTS.find(function(p){return p.id===params.postId;}) : null;
      items.push(bcCurrent(pInfo ? (isZh ? pInfo.zh.title : pInfo.en.title) : (isZh ? '文章' : 'Article')));
      break;

    case 'ageHub':
      if (params.age && AGE_HUBS[params.age]) {
        var ah = AGE_HUBS[params.age];
        items.push(bcLink('ageHub', 'ageHub', L.byAge));
        items.push(bcCurrent(ah.icon + ' ' + (isZh ? ah.zh.title : ah.en.title)));
      } else {
        items.push(bcCurrent(L.byAge));
      }
      break;

    case 'subjectHub':
      if (params.subject) {
        var sm = params.subject;
        var subNames = {math:isZh?'数学':'Math',english:isZh?'英语':'English',science:isZh?'科学':'Science',art:isZh?'艺术':'Art'};
        items.push(bcLink('ageHub', 'ageHub', L.bySubject));
        items.push(bcCurrent(subNames[sm] || sm));
      } else {
        items.push(bcCurrent(L.bySubject));
      }
      break;

    case 'watch':
      var vInfo = params.videoId ? getVideo(params.videoId) : null;
      items.push(bcCurrent(vInfo ? vInfo.title : L.watch));
      break;

    case 'search':
      items.push(bcCurrent(L.search));
      break;

    case 'about':
      items.push(bcCurrent(L.about));
      break;

    case 'feedback':
      items.push(bcCurrent(L.feedback));
      break;

    case 'me':
      items.push(bcCurrent(L.profile));
      break;

    case 'parent':
      items.push(bcCurrent(L.settings));
      break;

    default:
      break;
  }

  bc.innerHTML = items.join('');
  bc.classList.toggle('home-hidden', page === 'home');
}

// Build a related-items array for any page, returning 3-5 recommendations

    return {
      page: pageId, params: p,
      title: title, desc: desc, icon: icon, badge: badge,
      paramsAttr: paramsStr
    };
  }

  // Shuffle helper
  function shuffle(arr) { for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }

// Render related recommendations HTML
function renderRelatedSection(page, params) {
  var items = getRelatedItems(page, params);
  if (!items.length) return '';
  var isZh = document.documentElement.lang === 'zh-CN';

  var html = '<div class="related-section"><h3>💡 ' + (isZh ? '相关学习资源推荐' : 'Related Learning Resources') + '</h3>';
  html += '<div class="related-grid">';

  items.forEach(function(item) {
    html += '<a href="#' + item.page + '" class="related-card" data-page="' + item.page + '"';

function navigateTo(page, params = {}) {
  APP.currentPage = page;
  APP.ageFilter = params.ageFilter !== undefined ? params.ageFilter : APP.ageFilter;
  APP.categoryFilter = params.categoryFilter !== undefined ? params.categoryFilter : APP.categoryFilter;

  // Update SEO title and meta description
  updateSEO(page, params);

  // Inject structured data schemas
  injectStructuredData(page, params);

  // Update bottom nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page || (page === 'watch' && el.dataset.page === 'home') || (page === 'search' && el.dataset.page === null) || (page === 'favorites' && el.dataset.page === null));
  });

  // Special highlighting: parent page highlights the parent nav tab
  if (page === 'parent') {
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === 'parent');
    });
  } else if (['watch', 'course', 'search', 'favorites', 'channel', 'about', 'feedback', 'feedbackThanks', 'blog', 'blogPost', 'faq'].includes(page)) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  }

  // Update top navigation bar active state
  updateTopNav(page);

  // Update breadcrumb
  updateBreadcrumb(page, params);

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  switch(page) {
    case 'home': renderHome(main); break;
    case 'watch': renderWatch(main, params.videoId); break;
    case 'course': renderCourse(main, params.courseId); break;
    case 'practice': renderPractice(main, params.videoId); break;
    case 'me': renderMe(main); break;
    case 'favorites': renderFavorites(main); break;
    case 'search': if (params.query) APP.activeSearchQuery = params.query; renderSearch(main); break;
    case 'parent': renderParent(main); break;
    case 'courses': renderCoursesList(main); break;
    case 'channel': renderChannel(main, params.channelName); break;
    case 'about': renderAbout(main); break;
    case 'feedback': renderFeedback(main); break;
    case 'feedbackThanks': renderFeedbackThanks(main); break;
    case 'blog': renderBlogIndex(main); break;
    case 'blogPost': renderBlogPost(main, params.postId); break;
    case 'faq': renderFAQ(main); break;
    case 'ageHub': renderAgeHub(main, params.age); break;
    case 'subjectHub': renderSubjectHub(main, params.subject); break;
    default: renderHome(main);
  }

  // Inject related recommendations for content pages
  var relPages = ['courses','course','blog','blogPost','ageHub','subjectHub','watch','practice','search'];
  if (relPages.indexOf(page) !== -1) {
    main.innerHTML += renderRelatedSection(page, params);
  }

  window.scrollTo(0, 0);
}

// ─── EVENT DELEGATION: Intercept hash-link clicks ──────────────
// Converts <a href="#page" data-page="..."> clicks into SPA navigation
document.addEventListener('click', function(e) {
  var link = e.target.closest('a[href^="#"]');
  if (!link || link.getAttribute('href') === '#') return;
  var page = link.getAttribute('data-page');
  if (!page) return;
  e.preventDefault();
  var params = {};
  try {
    var raw = link.getAttribute('data-params');
    if (raw) params = JSON.parse(raw);
  } catch(_) {}
  navigateTo(page, params);
});

let bannerTimer = null;

function startBannerCarousel() {
  if (bannerTimer) clearInterval(bannerTimer);
  bannerIdx = 0;
  bannerTimer = setInterval(() => {
    bannerIdx = (bannerIdx + 1) % 3;
    goToBannerSlide(bannerIdx);
  }, 4000);
}

function goToBannerSlide(idx) {
  bannerIdx = idx;
  const slides = document.querySelectorAll('#home-banner .banner-slide');
  const dots = document.querySelectorAll('#home-banner .banner-dot');
  slides.forEach((s, i) => s.classList.toggle('active', i === idx));
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
}

let sessionSeconds = 0;
let dailySeconds = 0;
let sessionPaused = false;

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function startSessionTimer(videoId) {
  const s = getStore();
  sessionSeconds = 0;
  dailySeconds = s.dailyWatchTime || 0;
  sessionPaused = false;

  if (APP.timerInterval) clearInterval(APP.timerInterval);
  APP.timerInterval = setInterval(() => {
    if (sessionPaused) return;

    // Check blocked hours
    const now = new Date();
    const hhmm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    if (s.parentSettings.blockEnabled) {
      const blockStart = s.parentSettings.blockStart;
      const blockEnd = s.parentSettings.blockEnd;
      const isBlocked = isInBlockedTime(hhmm, blockStart, blockEnd);
      if (isBlocked) {
        showLockScreen('🌙 ' + t('restTime'), t('restTimeMsg', {blockStart: blockStart, blockEnd: blockEnd}), 'blocked');
        return;
      }
    }

    sessionSeconds++;
    dailySeconds++;
    s.dailyWatchTime = dailySeconds;

    // Update track progress for 85% auto-complete
    const video = getVideo(videoId);
    if (video) {
      const [m, sec] = video.duration.split(':').map(Number);
      const totalSec = m * 60 + sec;
      if (!s.progress) s.progress = {};
      s.progress[videoId] = {
        watched: sessionSeconds,
        total: totalSec,
        lastWatched: Date.now()
      };

      // 85% auto-complete
      if (sessionSeconds >= totalSec * 0.85 && !s.completed.includes(videoId)) {
        handleComplete(videoId);
      }
    }

    saveStore(s);

    // Update display
    const sessionEl = document.getElementById('session-timer');
    const dailyEl = document.getElementById('daily-timer');
    if (sessionEl) sessionEl.textContent = formatTime(sessionSeconds);
    if (dailyEl) dailyEl.textContent = formatTime(dailySeconds);

    // Session limit reached
    if (sessionSeconds >= s.parentSettings.sessionLimit * 60) {
      showLockScreen('⏰ ' + t('takeBreak'), t('takeBreakMsg', {limit: s.parentSettings.sessionLimit}), 'session');
    }

    // Daily limit reached
    if (dailySeconds >= s.parentSettings.dailyLimit * 60) {
      showLockScreen('📅 ' + t('dailyLimitReached'), t('dailyLimitMsg', {limit: s.parentSettings.dailyLimit}), 'daily');
    }
  }, 1000);
}

function isInBlockedTime(current, start, end) {
  if (start <= end) return current >= start && current < end;
  return current >= start || current < end; // overnight range e.g. 21:00-07:00
}

function showLockScreen(title, message, lockType = 'session') {
  // Pause the timer
  sessionPaused = true;

  // For blocked time: no math quiz, just the message
  const showQuiz = lockType !== 'blocked';

  const overlay = document.createElement('div');
  overlay.className = 'quiz-overlay';
  overlay.id = 'lock-overlay';
  overlay.innerHTML = `
    <div class="quiz-popup" style="max-width:420px">
      <h2>${title}</h2>
      <p style="margin-bottom:16px;color:var(--text-light)">${message}</p>
      ${showQuiz ? '<div id="lock-question"></div>' : '<div style="font-size:48px;margin:12px 0">🌙</div>'}
      ${!showQuiz ? '<div style="margin-top:8px;border-top:1px dashed #ddd;padding-top:12px"><button style="padding:10px 24px;border-radius:50px;border:none;background:#f0e8d8;font-size:14px;font-weight:700;cursor:pointer" onclick="this.closest(\'.quiz-overlay\').remove();navigateTo(\'home\')">' + t('backHome') + '</button></div>' : ''}
    </div>
  `;
  document.body.appendChild(overlay);

  if (showQuiz) {
    // Generate a simple math question for kids
    const a = Math.floor(Math.random() * 10) + 1;
    const b = Math.floor(Math.random() * 10) + 1;
    const answer = a + b;
    const wrongAnswers = [answer + 1, answer - 1, answer + 2].filter(x => x > 0 && x !== answer).slice(0, 2);
    const options = [answer, ...wrongAnswers].sort(() => Math.random() - 0.5);

    const qDiv = overlay.querySelector('#lock-question');
    qDiv.innerHTML = `
      <p style="font-size:15px;color:var(--text-light);margin-bottom:8px">${t('kidQuiz')}</p>
      <p style="font-size:24px;font-weight:800;margin:12px 0">${a} + ${b} = ?</p>
      ${options.map(o => `<button class="quiz-option" onclick="handleLockAnswer(${o},${answer},this)">${o}</button>`).join('')}
    `;
  }
}

function handleLockAnswer(chosen, correct, btn) {
  if (chosen === correct) {
    btn.classList.add('correct');
    playSuccess();
    showConfetti(20);
    setTimeout(() => {
      document.querySelector('.quiz-overlay')?.remove();
      sessionPaused = false;
    }, 800);
  } else {
    btn.classList.add('wrong');
    playError();
    btn.disabled = true;
  }
}

// ─── YOUTUBE PLAYER MESSAGE LISTENER ──────────────────────────
function setupYouTubeListener(videoId) {
  // Listen for YouTube player state changes via postMessage
  window.addEventListener('message', function onYTMessage(e) {
    if (!e.data || typeof e.data !== 'string') return;
    let data;
    try { data = JSON.parse(e.data); } catch(err) { return; }
    if (data.event === 'onStateChange' && data.info === 2) {
      // Video paused - show quiz
      showPauseQuiz(videoId);
    }
  });
}

let quizShownForVideo = {};
function showPauseQuiz(videoId) {
  if (quizShownForVideo[videoId]) return;
  quizShownForVideo[videoId] = true;

  setTimeout(() => {
    const questions = [
      { q: t('quizQ1'), opts: t('quizQ1_opts'), ans: 0 },
      { q: t('quizQ2'), opts: t('quizQ2_opts'), ans: 1 },
      { q: t('quizQ3'), opts: t('quizQ3_opts'), ans: 0 }
    ];
    const q = questions[Math.floor(Math.random() * questions.length)];

    const overlay = document.createElement('div');
    overlay.className = 'quiz-overlay';
    overlay.innerHTML = `
      <div class="quiz-popup">
        <h2>🤔 ${t('quizTitle')}</h2>
        <p style="margin-bottom:12px;font-weight:700">${q.q}</p>
        ${q.opts.map((o,i) => `<button class="quiz-option" onclick="handleQuizAnswer(${i},${q.ans},this.closest('.quiz-overlay'))">${o}</button>`).join('')}
      </div>
    `;
    document.body.appendChild(overlay);
  }, 1500);
}

function handleQuizAnswer(chosen, correct, overlay) {
  if (chosen === correct) {
    playSuccess(); showConfetti(15);
  } else {
    playError();
  }
  setTimeout(() => overlay?.remove(), 800);
}

// ─── DRAWING OVERLAY ──────────────────────────────────────────
function toggleDrawing() {
  const overlay = document.getElementById('drawing-overlay');
  if (!overlay) return;
  const active = overlay.classList.toggle('active');
  if (active) {
    const canvas = document.getElementById('drawing-canvas');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    setupDrawingCanvas(canvas);
  }
}

function setupDrawingCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  let drawing = false;
  canvas.onmousedown = e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
  canvas.onmousemove = e => { if (!drawing) return; ctx.lineWidth = 3; ctx.strokeStyle = '#FF8C42'; ctx.lineCap = 'round'; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); };
  canvas.onmouseup = () => { drawing = false; };
  canvas.onmouseleave = () => { drawing = false; };
  // Touch support
  canvas.ontouchstart = e => { e.preventDefault(); drawing = true; const t = e.touches[0]; ctx.beginPath(); ctx.moveTo(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top); };
  canvas.ontouchmove = e => { e.preventDefault(); if (!drawing) return; const t = e.touches[0]; ctx.lineWidth = 3; ctx.strokeStyle = '#FF8C42'; ctx.lineCap = 'round'; ctx.lineTo(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top); ctx.stroke(); };
  canvas.ontouchend = () => { drawing = false; };
}

function clearDrawing() {
  const canvas = document.getElementById('drawing-canvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

  const s = getStore();

  // Find the first uncompleted lesson (current)
  let currentIdx = course.videoIds.findIndex(vid => !s.completed.includes(vid));

  container.innerHTML = `

        ${course.videoIds.map((vid, idx) => {
          const v = getVideo(vid);
          if (!v) return '';
          const isCompleted = s.completed.includes(vid);

// ─── EXERCISE: LISTEN & CHOOSE ────────────────────────────────
function startExercise(type) {
  const data = PRACTICE_DATA.find(p => p.type === type);
  if (!data) return;

  const container = document.getElementById('exercise-container');
  const list = document.getElementById('practice-list');
  if (list) list.style.display = 'none';

  if (type === 'listen') { renderListenExercise(container, data); }
  else if (type === 'match') { renderMatchExercise(container, data); }
  else if (type === 'speak') { renderSpeakExercise(container, data); }
  else if (type === 'memory') { renderMemoryExercise(container, data); }
}

function renderListenExercise(container, data) {
  let qIdx = 0;
  let score = 0;

  function showQ() {
    if (qIdx >= data.questions.length) {
      finishExercise(container, score, data.questions.length);
      return;
    }
    const q = data.questions[qIdx];
    container.innerHTML = `
      <div class="exercise-area">
        <h3 style="margin-bottom:16px">👂 ${t('questionNum', {n: qIdx+1, total: data.questions.length})}</h3>
        <button style="padding:14px 32px;border-radius:50px;border:3px solid var(--blue);background:white;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:16px" onclick="speakWord('${q.word}','${q.word_cn}')">
          🔊 ${t('tapToHear')}
        </button>
        <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
          ${q.options.map((o,i) => `
          <button class="listen-option" style="font-size:36px;width:80px;height:80px" onclick="checkListenAnswer(${i},${q.answer},this)" data-idx="${i}">${o}</button>
          `).join('')}
        </div>
      </div>
    `;
  }

  window.checkListenAnswer = function(chosen, correct, btn) {
    const allBtns = container.querySelectorAll('.listen-option');
    allBtns.forEach(b => b.style.pointerEvents = 'none');
    if (chosen === correct) {
      btn.classList.add('correct'); score++; playSuccess();
    } else {
      btn.classList.add('wrong');
      allBtns[correct].classList.add('correct');
      playError();
    }
    setTimeout(() => { qIdx++; showQ(); }, 1200);
  };

  showQ();
}

function speakWord(word, word_cn) {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'en-US';
    utterance.rate = 0.8;
    window.speechSynthesis.speak(utterance);
  }
  playClick();
}

function renderMatchExercise(container, data) {
  const pairs = [...data.pairs];
  // Shuffle and prepare
  const shuffledWords = [...pairs].sort(() => Math.random() - 0.5);
  const shuffledEmojis = [...pairs].sort(() => Math.random() - 0.5);
  let matched = 0;

  function render() {
    container.innerHTML = `
      <div class="exercise-area">
        <h3 style="margin-bottom:16px">🤝 ${t('matchProgress', {matched: matched, total: pairs.length})}</h3>
        <p style="font-size:13px;color:var(--text-light);margin-bottom:12px">${t('matchHint')}</p>
        <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center">
          <div style="display:flex;flex-direction:column;gap:10px" id="word-list">
            ${shuffledWords.map((p, i) => `
            <div class="drag-source" draggable="true" data-word="${p.word}" id="word-${i}" ondragstart="dragStart(event,'${p.word}')" ondragend="dragEnd(event)">
              ${p.word}
            </div>
            `).join('')}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center" id="emoji-list">
            ${shuffledEmojis.map((p, i) => `
            <div class="drag-target" data-answer="${p.emoji}" id="target-${i}"
              ondragover="event.preventDefault()"
              ondragenter="event.target.classList.add('over')"
              ondragleave="event.target.classList.remove('over')"
              ondrop="handleDrop(event,'${p.emoji}',this)">
              ${p.emoji}
            </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  window.dragStart = function(e, word) { e.dataTransfer.setData('text/plain', word); };
  window.dragEnd = function(e) {};

  window.handleDrop = function(e, targetEmoji, el) {
    e.preventDefault();
    el.classList.remove('over');
    const word = e.dataTransfer.getData('text/plain');
    const pair = pairs.find(p => p.word === word && p.emoji === targetEmoji);
    if (pair) {
      // Remove the matched word source
      const sources = container.querySelectorAll('.drag-source');
      sources.forEach(s => { if (s.dataset.word === word) s.remove(); });
      el.style.borderColor = 'var(--green)';
      el.style.background = '#EDFFF5';
      el.innerHTML = targetEmoji + '<br><small style="font-size:10px;color:var(--green)">✓ ' + word + '</small>';
      matched++; playSuccess();
      if (matched >= pairs.length) {
        setTimeout(() => finishExercise(container, pairs.length, pairs.length), 800);
      }
    } else {
      playError();
      el.style.borderColor = 'var(--coral)';
      setTimeout(() => { el.style.borderColor = '#ccc'; }, 500);
    }
  };

  render();
}

function renderSpeakExercise(container, data) {
  let wIdx = 0;
  const words = data.words;

  function render() {
    if (wIdx >= words.length) {
      finishExercise(container, words.length, words.length);
      return;
    }
    container.innerHTML = `
      <div class="exercise-area">
        <h3 style="margin-bottom:16px">🎙️ ${t('speakProgress', {n: wIdx+1, total: words.length})}</h3>
        <p style="font-size:28px;font-weight:800;margin:20px 0;color:var(--orange)">"${words[wIdx]}"</p>
        <button style="padding:14px 28px;border-radius:50px;border:none;background:var(--orange);color:white;font-size:16px;font-weight:700;cursor:pointer;margin:8px" onclick="startRecording()">🔴 ${t('startRecord')}</button>
        <button style="padding:14px 28px;border-radius:50px;border:3px solid #f0e8d8;background:white;font-size:16px;font-weight:700;cursor:pointer;margin:8px" onclick="stopRecording()">⏹ ${t('stopRecord')}</button>
        <div id="recording-status" style="margin:12px 0;font-size:14px;color:var(--text-light)"></div>
        <audio id="recording-playback" controls style="display:none;width:100%;margin-top:8px"></audio>
        <button id="next-word-btn" style="display:none;padding:12px 28px;border-radius:50px;border:none;background:var(--green);color:white;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px" onclick="nextSpeakWord()">${t('nextQ')}</button>
      </div>
    `;
  }

  let mediaRecorder, audioChunks = [];
  window.startRecording = function() {
    audioChunks = [];
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const audio = document.getElementById('recording-playback');
        audio.src = url; audio.style.display = 'block';
        document.getElementById('recording-status').textContent = '🌟 ' + t('recordingDone');
        document.getElementById('next-word-btn').style.display = 'inline-block';
        playSuccess();
        // Stop all tracks
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      document.getElementById('recording-status').textContent = '🔴 ' + t('recording');
    }).catch(() => {
      document.getElementById('recording-status').textContent = '⚠️ ' + t('noMic');
    });
  };

  window.stopRecording = function() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  };

  window.nextSpeakWord = function() { wIdx++; render(); };

  render();
}

function renderMemoryExercise(container, data) {
  const cards = [...data.cards].sort(() => Math.random() - 0.5);
  const state = { flipped: new Set(), matched: new Set(), firstCard: null, moves: 0, totalPairs: cards.length / 2 };
  let locked = false;

  function render() {
    container.innerHTML = `
      <div class="exercise-area">
        <h3 style="margin-bottom:12px">🃏 ${t('memoryProgress', {matched: state.matched.size, total: state.totalPairs})}</h3>
        <div class="memory-grid">
          ${cards.map((emoji, idx) => {
            const isFlipped = state.flipped.has(idx) || state.matched.has(idx);
            const isMatched = state.matched.has(idx);
            return `
            <div class="memory-card ${isFlipped ? 'flipped' : ''} ${isMatched ? 'matched' : ''}" onclick="flipMemoryCard(${idx})" data-idx="${idx}">
              ${isFlipped ? emoji : '❓'}
            </div>`;
          }).join('')}
        </div>
        <p style="text-align:center;margin-top:12px;color:var(--text-light)">${t('moves')}: ${state.moves}</p>
      </div>
    `;
  }

  window.flipMemoryCard = function(idx) {
    if (locked) return;
    if (state.flipped.has(idx) || state.matched.has(idx)) return;

    state.flipped.add(idx);
    state.moves++;
    playClick();
    render();

    if (state.firstCard === null) {
      state.firstCard = idx;
    } else {
      locked = true;
      const first = state.firstCard;
      if (cards[first] === cards[idx]) {
        // Match!
        state.matched.add(first); state.matched.add(idx);
        state.flipped.delete(first); state.flipped.delete(idx);
        state.firstCard = null; locked = false;
        playSuccess();
        render();
        if (state.matched.size === cards.length) {
          setTimeout(() => finishExercise(container, state.totalPairs, state.totalPairs), 500);
        }
      } else {
        // No match
        setTimeout(() => {
          state.flipped.delete(first); state.flipped.delete(idx);
          state.firstCard = null; locked = false;
          playError();
          render();
        }, 800);
      }
    }
  };

  render();
}

function finishExercise(container, score, total) {
  const stars = score === total ? 3 : score >= total * 0.6 ? 2 : 1;
  addStar(stars);
  updateStreak();
  playCelebration(); showConfetti(50); showStarPopup(`🎉 获得 ${stars} 颗星！`);

  container.innerHTML = `
    <div class="exercise-area" style="text-align:center">
      <div style="font-size:60px;margin:20px 0">${'⭐'.repeat(stars)}</div>
      <h2 style="font-size:24px;margin-bottom:8px">${t('exerciseDone')}</h2>

function submitFeedback(e) {
  e.preventDefault();
  const type = document.querySelector('input[name="fbType"]:checked');
  const msg = document.getElementById('fb-message').value.trim();
  const email = document.getElementById('fb-email').value.trim();

  if (!type) { alert('Please select a feedback type'); return; }
  if (!msg) { alert('Please enter your feedback'); return; }

  // Store feedback locally
  const s = getStore();
  if (!s.feedback) s.feedback = [];
  s.feedback.push({
    type: type.value,
    message: msg,
    email: email,
    date: new Date().toISOString()
  });
  saveStore(s);

  // Disable button
  const btn = document.getElementById('fb-submit-btn');
  btn.textContent = '✓ ' + t('saved');
  btn.style.background = '#4CAF50';
  btn.disabled = true;

  setTimeout(() => {
    navigateTo('feedbackThanks');
  }, 800);
}

  const results = query
    ? VIDEO_DB.filter(v => {
        const q = query.toLowerCase();
        return (v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q) || v.category.includes(q)) && !hiddenVids.includes(v.id);
      })

  container.innerHTML = `

        <label for="search-input" class="sr-only">${t('searchPlaceholder')}</label>
        <input class="search-input" id="search-input" name="q" type="search" placeholder="${t('searchPlaceholder')}" value="${query}" oninput="performSearch(this.value)" autocomplete="off" aria-label="${t('searchPlaceholder')}" toolparamtitle="Search Query" toolparamdescription="Keyword to search videos by title, channel, or category">
        <button class="voice-btn" id="voice-search-btn" type="button" onclick="startVoiceSearch()" title="${t('voiceSearch')}" aria-label="${t('voiceSearch')}">🎤</button>
      </form>

      ${query ? '<p style="color:var(--text-light);margin:8px 0">' + t('foundResults', {n: results.length}) + '</p>' : ''}

      <div class="video-grid">
        ${results.map(v => `
        <div class="video-card" onclick="navigateTo('watch',{videoId:'${v.id}'})">
          <div class="video-thumb">
            <img src="${getYouTubeThumb(v.id)}" alt="${v.title}" onerror="this.style.display='none'">
            <div class="play-btn">▶</div>
            <div class="video-age-tag">${v.ages[0]}-${v.ages[1]}${APP.lang === 'zh' ? '岁' : 'y'}</div>
            <div class="video-duration">${v.duration}</div>
          </div>
          <div class="video-info">
            <h3>${v.title}</h3>
            <div class="channel">${v.channel} · ${v.category}</div>
          </div>
        </div>
        `).join('')}
      </div>
      ${query && results.length === 0 ? '<p style="text-align:center;color:#999;padding:40px">🔍 ' + t('noResults') + '</p>' : ''}
      ${!query ? '<p style="text-align:center;color:#999;padding:40px">🔍 ' + t('searchHint') + '</p>' : ''}
    </div>
  `;
}

function performSearch(val) {
  APP.activeSearchQuery = val;
  navigateTo('search');
}

function startVoiceSearch() {
  const btn = document.getElementById('voice-search-btn');
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert(t('noVoiceSupport'));
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  btn.classList.add('listening');
  recognition.start();

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    const input = document.getElementById('search-input');
    if (input) { input.value = transcript; performSearch(transcript); }
  };

  recognition.onerror = () => { btn.classList.remove('listening'); };
  recognition.onend = () => { btn.classList.remove('listening'); };
}

function switchParentTab(tab, btn) {
  document.querySelectorAll('.parent-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['time','whitelist','report','sound'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
}

function toggleBlockTimeInputs() {
  const checked = document.getElementById('block-enabled')?.checked;
  const fields = document.getElementById('block-time-fields');
  if (fields) fields.style.display = checked ? 'block' : 'none';
}

function saveTimeSettings() {
  const s = getStore();
  const sessionLimit = parseInt(document.getElementById('session-limit')?.value) || 20;
  const dailyLimit = parseInt(document.getElementById('daily-limit')?.value) || 60;
  const blockStart = document.getElementById('block-start')?.value || '21:00';
  const blockEnd = document.getElementById('block-end')?.value || '07:00';
  const blockEnabled = document.getElementById('block-enabled')?.checked || false;

  s.parentSettings.sessionLimit = sessionLimit;
  s.parentSettings.dailyLimit = dailyLimit;
  s.parentSettings.blockStart = blockStart;
  s.parentSettings.blockEnd = blockEnd;
  s.parentSettings.blockEnabled = blockEnabled;
  saveStore(s);
  playSuccess();
  alert('✅ ' + t('saved'));
}

function toggleVideoHidden(videoId) {
  const s = getStore();
  if (!s.parentSettings.hiddenVideos) s.parentSettings.hiddenVideos = [];
  const idx = s.parentSettings.hiddenVideos.indexOf(videoId);
  if (idx >= 0) { s.parentSettings.hiddenVideos.splice(idx, 1); } else { s.parentSettings.hiddenVideos.push(videoId); }
  saveStore(s);
  navigateTo('parent');
  // Re-show whitelist tab
  setTimeout(() => {
    const tabs = document.querySelectorAll('.parent-tab');
    tabs.forEach(t => t.classList.remove('active'));
    tabs[1]?.classList.add('active');
    ['time','whitelist','report','sound'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.style.display = t === 'whitelist' ? 'block' : 'none';
    });
  }, 100);
  playClick();
}

function toggleSound() {
  const s = getStore();
  s.soundEnabled = !s.soundEnabled;
  saveStore(s);
  navigateTo('parent');
  setTimeout(() => {
    const tabs = document.querySelectorAll('.parent-tab');
    tabs.forEach(t => t.classList.remove('active'));
    tabs[3]?.classList.add('active');
    ['time','whitelist','report','sound'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.style.display = t === 'sound' ? 'block' : 'none';
    });

}

  var subtitle = isEn ? info.en_subtitle : info.zh_subtitle;
  var intro = isEn ? info.en_intro : info.zh_intro;
  var tags = (isEn ? info.en_tags : info.zh_tags).split(', ');

  var videos = VIDEO_DB.filter(function(v) {
    return info.cat.some(function(c) { return v.category === c; });
  });

  var videoCards = videos.slice(0, 12).map(function(v) {
    return '<div class="video-card" onclick="navigateTo(\'watch\',{videoId:\'' + v.id + '\'})">' +
      '<div class="video-thumb"><img src="' + getYouTubeThumb(v.id) + '" alt="' + v.title + '" onerror="this.style.display=\'none\'"><div class="play-btn">▶</div><div class="video-duration">' + v.duration + '</div></div>' +
      '<div class="video-info"><h3>' + v.title + '</h3><div class="channel">' + v.channel + '</div><span class="age-badge">' + v.ages[0] + '-' + v.ages[v.ages.length-1] + '岁</span></div>' +
    '</div>';
  }).join('');

  container.innerHTML = '<div class="page active">' +
    '<button style="padding:8px 16px;border:none;background:#f0e8d8;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px" onclick="navigateTo(\'home\')">← ' + (isEn ? 'Back to Home' : '返回首页') + '</button>' +
    '<div style="background:linear-gradient(135deg,' + info.color + ',' + info.color + 'dd);border-radius:16px;padding:24px;margin-bottom:20px;color:white">' +
      '<h1 style="font-size:22px;margin-bottom:8px">' + info.icon + ' ' + title + '</h1>' +
      '<p style="font-size:14px;opacity:0.9">' + subtitle + '</p>' +
    '</div>' +
    '<p style="font-size:14px;line-height:1.8;color:#555;margin-bottom:16px">' + intro + '</p>' +
    '<div style="margin-bottom:16px">' +
      '<span style="font-size:12px;color:#999;margin-right:8px">' + (isEn ? 'Topics:' : '热门标签：') + '</span>' +
      tags.map(function(t) { return '<a href="#search" data-page="search" data-params=\'{"query":"' + t + '"}\' style="display:inline-block;background:#f0e8d8;color:#8B6914;padding:3px 10px;border-radius:12px;font-size:11px;margin:2px;text-decoration:none;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background=\'#e8d4a0\'" onmouseout="this.style.background=\'#f0e8d8\'">' + t + '</a>'; }).join(' ') +
    '</div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">' +
      '<span style="font-size:12px;color:#999">' + (isEn ? 'Age Groups:' : '按年龄段：') + '</span>' +
      '<a href="#ageHub" data-page="ageHub" data-params=\'{"age":"3-5"}\' style="padding:4px 12px;background:#e8f5e9;color:#2E7D32;border-radius:12px;font-size:12px;text-decoration:none;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background=\'#c8e6c9\'" onmouseout="this.style.background=\'#e8f5e9\'">🌱 3-5 ' + (isEn ? 'yrs' : '岁') + '</a>' +
      '<a href="#ageHub" data-page="ageHub" data-params=\'{"age":"6-8"}\' style="padding:4px 12px;background:#fff3e0;color:#E65100;border-radius:12px;font-size:12px;text-decoration:none;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background=\'#ffe0b2\'" onmouseout="this.style.background=\'#fff3e0\'">🌿 6-8 ' + (isEn ? 'yrs' : '岁') + '</a>' +
      '<a href="#ageHub" data-page="ageHub" data-params=\'{"age":"9-12"}\' style="padding:4px 12px;background:#f3e5f5;color:#7B1FA2;border-radius:12px;font-size:12px;text-decoration:none;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background=\'#e1bee7\'" onmouseout="this.style.background=\'#f3e5f5\'">🌳 9-12 ' + (isEn ? 'yrs' : '岁') + '</a>' +
    '</div>' +
    '<h2 style="font-size:16px;margin-bottom:12px;color:#4A4A4A">' + (isEn ? 'Videos (' + videos.length + ')' : '学习视频 (' + videos.length + '个)') + '</h2>' +
    '<div class="video-grid">' + videoCards + '</div>' +
  '</div>';
}
function init() {
  // Ensure store has all default fields
  const defaults = getStore();
  const s = { ...defaults, ...JSON.parse(localStorage.getItem('kids_edu_store') || '{}') };
  // Merge missing defaults
  if (!s.playlists) s.playlists = { "默认": [] };
  if (!s.parentSettings) s.parentSettings = { sessionLimit: 20, dailyLimit: 60, blockStart: "21:00", blockEnd: "07:00", blockEnabled: false, hiddenVideos: [] };
  if (!s.parentSettings.hiddenVideos) s.parentSettings.hiddenVideos = [];
  if (!s.soundEnabled && s.soundEnabled !== false) s.soundEnabled = true;
  if (!s.streakDates) s.streakDates = [];
  if (!s.progress) s.progress = {};
  saveStore(s);

  // Initial render
  updateNavLabels();
  navigateTo('home');
}

// ─── START ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);

// Clean up timer on page unload
window.addEventListener('beforeunload', () => {
  if (APP.timerInterval) clearInterval(APP.timerInterval);
});
</script>

</body>
</html>
