        <button style="padding:10px 28px;border-radius:50px;border:3px solid var(--orange);background:white;font-size:15px;font-weight:700;cursor:pointer" onclick="submitChangePinStep(${step})">${step < 3 ? t('nextStep') : t('confirmModify')}</button>
        <button style="padding:10px 20px;border-radius:50px;border:none;background:#f0e8d8;font-size:15px;font-weight:700;cursor:pointer" onclick="document.querySelector('.modal-overlay').remove()">${t('cancel')}</button>
      </div>
      <p id="change-pin-error" style="margin-top:12px;font-size:12px;color:#e74c3c;display:none"></p>
    </div>
  `;
  document.body.appendChild(overlay);
  APP.changePinStep = step;
  APP.changePinInput = [];
  if (step === 1) {
    APP.changePinOld = null;
    APP.changePinNew = null;
  }
  updateChangePinDisplay();
}

function changePinDotClick(idx) {
  APP.changePinInput.push(idx);
  document.querySelectorAll('.pattern-dot').forEach(d => {
    if (parseInt(d.dataset.idx) === idx) d.classList.add('selected');
  });
  updateChangePinDisplay();
  playClick();
}

function updateChangePinDisplay() {
  const el = document.getElementById('change-pin-display');
  if (el) el.textContent = (APP.changePinInput || []).join(' → ');
}

function submitChangePinStep(step) {
  const input = (APP.changePinInput || []).join(',');
  const errorEl = document.getElementById('change-pin-error');
  
  if (APP.changePinInput.length < 2) {
    if (errorEl) { errorEl.style.display = 'block'; errorEl.textContent = t('needMin2'); }
    return;
  }
  
  if (step === 1) {
    // Verify old pattern
    const correct = (APP.correctPattern || []).join(',');
    if (input !== correct) {
      if (errorEl) { errorEl.style.display = 'block'; errorEl.textContent = t('wrongPattern'); playError(); }
      APP.changePinInput = [];
      document.querySelectorAll('.pattern-dot').forEach(d => d.classList.remove('selected'));
      updateChangePinDisplay();
      return;
    }
    // Old pattern verified, move to step 2
    if (errorEl) errorEl.style.display = 'none';
    playSuccess();
    document.querySelector('.modal-overlay').remove();
    showChangePinStep(2);
  } else if (step === 2) {
    // Save new pattern, move to step 3
    APP.changePinNew = APP.changePinInput;
    document.querySelector('.modal-overlay').remove();
    showChangePinStep(3);
  } else if (step === 3) {
    // Confirm new pattern matches
    const newPat = (APP.changePinNew || []).join(',');
    if (input !== newPat) {
      if (errorEl) { errorEl.style.display = 'block'; errorEl.textContent = t('pinMismatch2'); playError(); }
      APP.changePinInput = [];
      document.querySelectorAll('.pattern-dot').forEach(d => d.classList.remove('selected'));
      updateChangePinDisplay();
      return;
    }
    // Success - save new pattern
    APP.correctPattern = [...APP.changePinNew];
    const s = getStore();
    s.parentPattern = APP.correctPattern;
    saveStore(s);
    document.querySelector('.modal-overlay').remove();
    playSuccess();
    // If coming from Me page, show a confirmation
    alert('✅ ' + t('pinChanged'));
    navigateTo('me');
  }
}

function renderParent(container) {
  if (!APP.parentUnlocked) {
    container.innerHTML = `
      <div class="page active" style="text-align:center;padding:60px 20px">
        <div style="font-size:64px;margin-bottom:16px">🔒</div>
        <h2 style="font-size:20px;margin-bottom:8px">${t('parentSettings')}</h2>
        <p style="color:var(--text-light);margin-bottom:24px">${t('enterPatternToAccess')}</p>
        <button style="padding:14px 36px;border-radius:50px;border:none;background:var(--orange);color:white;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(255,140,66,0.35)" onclick="openParentLock()">🔒 ${t('enterPassword')}</button>
      </div>`;
    return;
  }

  const s = getStore();
  const ps = s.parentSettings;

  container.innerHTML = `
    <div class="page active">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <h2 style="font-size:22px">⚙️ ${t('parentSettings')}</h2>
          <p style="font-size:13px;color:var(--text-light)">${t('parentSettingsSub')}</p>
        </div>
        <button style="padding:8px 16px;border-radius:20px;border:2px solid #f0e8d8;background:white;font-size:13px;font-weight:600;cursor:pointer" onclick="APP.parentUnlocked=false;navigateTo('home');playClick()">🔒 ${t('lock')}</button>
      </div>

      <!-- Tab bar -->
      <div class="parent-tab-bar" style="margin-bottom:16px">
        <button class="parent-tab active" onclick="switchParentTab('time',this)">⏱ ${t('timeSettings')}</button>
        <button class="parent-tab" onclick="switchParentTab('whitelist',this)">📋 ${t('contentMgmt')}</button>
        <button class="parent-tab" onclick="switchParentTab('report',this)">📊 ${t('learningReport')}</button>
        <button class="parent-tab" onclick="switchParentTab('sound',this)">🔊 ${t('soundEffects')}</button>
        <button class="parent-tab" onclick="switchParentTab('pin',this)">🔒 ${t('changePIN')}</button>
      </div>

      <div id="parent-tab-content">
        <!-- Time settings -->
        <div id="tab-time">
          <div class="setting-row">
            <label>${t('sessionLength')}</label>
            <div>
              <input type="number" id="session-limit" value="${ps.sessionLimit}" min="5" max="120"> ${t('minutes')}
              <button style="margin-left:8px;padding:6px 14px;border-radius:20px;border:none;background:var(--orange);color:white;font-weight:700;cursor:pointer;font-size:12px" onclick="saveTimeSettings()">${APP.lang === 'zh' ? '保存' : 'Save'}</button>
            </div>
          </div>
          <div class="setting-row">
            <label>${t('dailyLength')}</label>
            <div>
              <input type="number" id="daily-limit" value="${ps.dailyLimit}" min="10" max="300"> ${t('minutes')}
            </div>
          </div>
          <div class="toggle-row">
            <label>${t('blockToggle')}</label>
            <label class="toggle-switch">
              <input type="checkbox" id="block-enabled" ${ps.blockEnabled ? 'checked' : ''} onchange="toggleBlockTimeInputs()">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div id="block-time-fields" style="display:${ps.blockEnabled ? 'block' : 'none'}">
            <div class="setting-row">
              <label>${t('blockedStart')}</label>
              <input type="time" id="block-start" value="${ps.blockStart}">
            </div>
            <div class="setting-row">
              <label>${t('blockedEnd')}</label>
              <input type="time" id="block-end" value="${ps.blockEnd}">
            </div>
            <p style="font-size:12px;color:var(--text-light);padding:8px">💡 ${t('blockedHint')}</p>
          </div>
          <button style="margin-top:8px;padding:10px 24px;border-radius:50px;border:none;background:var(--blue);color:white;font-weight:700;cursor:pointer" onclick="saveTimeSettings()">💾 ${t('saveAll')}</button>
        </div>

        <!-- Content whitelist -->
        <div id="tab-whitelist" style="display:none">
          <p style="color:var(--text-light);margin-bottom:12px">${t('manageVideos')}</p>
          ${VIDEO_DB.map(v => {
            const hidden = (ps.hiddenVideos || []).includes(v.id);
            return `
            <div class="whitelist-video ${hidden ? 'hidden-video' : ''}">
              <span>${v.title.substring(0, 40)}...</span>
              <span style="font-size:11px;color:var(--text-light)">${v.category} | ${v.ages[0]}-${v.ages[1]}${APP.lang === 'zh' ? '岁' : 'y'}</span>
              <button class="whitelist-toggle ${hidden ? 'hide' : ''}" onclick="toggleVideoHidden('${v.id}')">${hidden ? t('hidden') : t('shown')}</button>
            </div>`;
          }).join('')}
        </div>

        <!-- Learning report -->
        <div id="tab-report" style="display:none">
          <div style="background:white;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)">
            <h3 style="margin-bottom:12px">📊 ${t('learningReport')}</h3>
            <p style="margin:8px 0"><strong>${t('videosWatchedTotal')}：</strong>${s.watchCount}</p>
            <p style="margin:8px 0"><strong>${t('starsTotal')}：</strong>${s.stars} ⭐</p>
            <p style="margin:8px 0"><strong>${t('streakDaysTotal')}：</strong>${s.streak} ${APP.lang === 'zh' ? '天' : 'days'}</p>
            <p style="margin:8px 0"><strong>${t('totalLearning')}：</strong>${Math.floor((s.totalWatchTime || 0) / 60)} ${t('minutes')}</p>
            <p style="margin:8px 0"><strong>${t('badgesEarned')}：</strong>${s.badges.length}/${BADGES.length}</p>
            <p style="margin:8px 0"><strong>${t('videosCompleted')}：</strong>${s.completed.length}/${VIDEO_DB.length}</p>
            <p style="margin:8px 0"><strong>${t('videosFavorited')}：</strong>${s.favorites.length}</p>
          </div>

          <div style="background:white;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);margin-top:12px">
            <h3 style="margin-bottom:8px">📋 ${t('completedVideosList')}</h3>
            ${s.completed.length === 0 ? '<p style="color:var(--text-light)">' + t('noCompletedVideos') + '</p>' :
            s.completed.map(vid => {
              const v = getVideo(vid);
              return v ? `<p style="font-size:13px;margin:4px 0">✅ ${v.title} (${v.category})</p>` : '';
            }).join('')}
          </div>
        </div>

        <!-- Sound settings -->
        <div id="tab-sound" style="display:none">
          <div class="setting-row">
            <label>🔊 ${t('soundFeedback')}</label>
            <button style="padding:10px 20px;border-radius:50px;border:none;background:${s.soundEnabled ? 'var(--green)' : '#ccc'};color:white;font-weight:700;cursor:pointer" onclick="toggleSound()">
              ${s.soundEnabled ? t('soundOn') : t('soundOff')}
            </button>
          </div>
          <p style="font-size:12px;color:var(--text-light);padding:8px">${t('soundOffHint')}</p>
        </div>

        <!-- Change PIN -->
        <div id="tab-pin" style="display:none">
          <p style="color:var(--text-light);margin-bottom:12px">${t('modifyParentPIN')}</p>
          <div style="background:white;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);text-align:center">
            <p style="margin-bottom:12px">${t('currentPattern')}：<strong>${(APP.correctPattern || []).join(' → ') || t('notSet')}</strong></p>
            <button style="padding:12px 32px;border-radius:50px;border:none;background:var(--orange);color:white;font-weight:700;font-size:15px;cursor:pointer" onclick="openChangePin()">
              🔒 ${t('changePIN')}
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function switchParentTab(tab, btn) {
  document.querySelectorAll('.parent-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['time','whitelist','report','sound','pin'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
}

function toggleBlockTimeInputs() {
  const checked = document.getElementById('block-enabled')?.checked;
  const fields = document.getElementById('block-time-fields');
  if (fields) fields.style.display = checked ? 'block' : 'none';
}

function saveTimeSettings() {
  const s = getStore();
  const sessionLimit = parseInt(document.getElementById('session-limit')?.value) || 20;
  const dailyLimit = parseInt(document.getElementById('daily-limit')?.value) || 60;
  const blockStart = document.getElementById('block-start')?.value || '21:00';
  const blockEnd = document.getElementById('block-end')?.value || '07:00';
  const blockEnabled = document.getElementById('block-enabled')?.checked || false;

  s.parentSettings.sessionLimit = sessionLimit;
  s.parentSettings.dailyLimit = dailyLimit;
  s.parentSettings.blockStart = blockStart;
  s.parentSettings.blockEnd = blockEnd;
  s.parentSettings.blockEnabled = blockEnabled;
  saveStore(s);
  playSuccess();
  alert('✅ ' + t('saved'));
}

function toggleVideoHidden(videoId) {
  const s = getStore();
  if (!s.parentSettings.hiddenVideos) s.parentSettings.hiddenVideos = [];
  const idx = s.parentSettings.hiddenVideos.indexOf(videoId);
  if (idx >= 0) { s.parentSettings.hiddenVideos.splice(idx, 1); } else { s.parentSettings.hiddenVideos.push(videoId); }
  saveStore(s);
  navigateTo('parent');
  // Re-show whitelist tab
  setTimeout(() => {
    const tabs = document.querySelectorAll('.parent-tab');
    tabs.forEach(t => t.classList.remove('active'));
    tabs[1]?.classList.add('active');
    ['time','whitelist','report','sound'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.style.display = t === 'whitelist' ? 'block' : 'none';
    });
  }, 100);
  playClick();
}

function toggleSound() {
  const s = getStore();
  s.soundEnabled = !s.soundEnabled;
  saveStore(s);
  navigateTo('parent');
  setTimeout(() => {
    const tabs = document.querySelectorAll('.parent-tab');
    tabs.forEach(t => t.classList.remove('active'));
    tabs[3]?.classList.add('active');
    ['time','whitelist','report','sound'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.style.display = t === 'sound' ? 'block' : 'none';
    });
  }, 100);
  playClick();
}

// ─── INIT ──────────────────────────────────────────────────────
function init() {
  // Ensure store has all default fields
  const defaults = getStore();
  const s = { ...defaults, ...JSON.parse(localStorage.getItem('kids_edu_store') || '{}') };
  // Merge missing defaults
  if (!s.playlists) s.playlists = { "默认": [] };
  if (!s.parentSettings) s.parentSettings = { sessionLimit: 20, dailyLimit: 60, blockStart: "21:00", blockEnd: "07:00", blockEnabled: false, hiddenVideos: [] };
  if (!s.parentSettings.hiddenVideos) s.parentSettings.hiddenVideos = [];
  if (!s.soundEnabled && s.soundEnabled !== false) s.soundEnabled = true;
  if (!s.streakDates) s.streakDates = [];
  if (!s.progress) s.progress = {};
  saveStore(s);

  // Load parent pattern from localStorage
  if (s.parentPattern) {
    APP.correctPattern = s.parentPattern;
  }

  // If no parent pattern has been set, show first-time setup
  if (!APP.correctPattern) {
    showFirstTimePinSetup();
    return;
  }

  // Initial render
  updateNavLabels();
  navigateTo('home');
}

// ─── START ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);

// Clean up timer on page unload
window.addEventListener('beforeunload', () => {
  if (APP.timerInterval) clearInterval(APP.timerInterval);
});
</script>

</body>
</html>
